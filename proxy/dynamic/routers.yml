http:
  routers:
    redirect-http-to-https:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - redirect-https
      service: noop

    # Bloque les requêtes de bots sur HTTP (wp-*, .env, .git, .htaccess…)
    block-bots-http:
      rule: "PathRegexp(`(?i)(/wp-|\\.env|\\.git|\\.htaccess|\\.sql|\\.bak|/server-status|/config|/anthropic|/sdk|\\.php|/telescope|/security\\.txt|/actuator|/dr0v|/check|/ip|/bin)`)"
      priority: 1000
      entryPoints:
        - web
      middlewares:
        - bot-blocker
      service: noop

    # Bloque les requêtes de bots sur HTTPS
    block-bots-https:
      rule: "PathRegexp(`(?i)(/wp-|\\.env|\\.git|\\.htaccess|\\.sql|\\.bak|/server-status|/config|/anthropic|/sdk|\\.php|/telescope|/security\\.txt|/actuator|/dr0v|/check|/ip|/bin)`)"
      priority: 1000
      entryPoints:
        - websecure
      middlewares:
        - bot-blocker
      service: noop
      tls: {}

    # Limite les appels sur l'endpoint de login
    login-rate-limit:
      rule: "Path(`/user/login`)"
      priority: 500
      entryPoints:
        - websecure
      middlewares:
        - login-rate-limit
        - no-robots
      service: app-front
      tls: {}

    catch-all:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - websecure
      service: app-front
      middlewares:
        - no-robots
      tls: {}

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    app-front:
      loadBalancer:
        servers:
          - url: "http://sauv-app:5000"

    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"