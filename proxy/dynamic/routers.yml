http:
  routers:
    app-front:
      rule: "Host(`app.internal`)"
      entryPoints:
        - websecure
      service: app-front
      tls: {}

    app-back:
      rule: "Host(`api.internal`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      service: app-back
      tls: {}

    redirect-http:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - redirect-https
      service: noop

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true