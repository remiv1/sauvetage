http:
  routers:
    redirect-http-to-https:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - redirect-https
      service: noop

    catch-all:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - websecure
      service: app-front
      tls: {}

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    app-front:
      loadBalancer:
        servers:
          - url: "http://sauv-app:5000"

    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"