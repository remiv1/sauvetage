version: '3'
services:
  test-db:
    build:
      context: ..
      dockerfile: tests/Dockerfile.postgres.test
    env_file:
      - ../databases/main/.env.db_main
    ports:
      - "5433:5432"

  db-logs:
    build:
      context: ..
      dockerfile: tests/Dockerfile.mongo.test
    env_file:
      - ../databases/logs/.env.db_logs
    ports:
      - "27018:27017"