[webador]
service = "webador"

[webador.documentation]
api_url_prod = "https://api.webador.com/v1"
description = "JouwWeb / Webador public API"

[[webador.documentation.methods]]
for = "List webshop customers"
endpoint = "/websites/{website}/webshop/customers"
type = "GET"
parameters.needed = ["website"]
parameters.optional = []

[[webador.documentation.methods]]
for = "Retrieve a single webshop customer by ID"
endpoint = "/websites/{website}/webshop/customers/{customer}"
type = "GET"
parameters.needed = ["website", "customer"]
parameters.optional = []

[[webador.documentation.methods]]
for = "List webshop orders"
endpoint = "/websites/{website}/webshop/orders"
type = "GET"
parameters.needed = ["website"]
parameters.optional = []

[[webador.documentation.methods]]
for = "Retrieve a single webshop order by ID"
endpoint = "/websites/{website}/webshop/orders/{order}"
type = "GET"
parameters.needed = ["website", "order"]
parameters.optional = []

[[webador.documentation.methods]]
for = "List webshop products"
endpoint = "/websites/{website}/webshop/products"
type = "GET"
parameters.needed = ["website"]
parameters.optional = []

[[webador.documentation.methods]]
for = "Retrieve a single webshop product by ID"
endpoint = "/websites/{website}/webshop/products/{product}"
type = "GET"
parameters.needed = ["website", "product"]
parameters.optional = []

[[webador.documentation.methods]]
for = "Retrieve webshop details for a website"
endpoint = "/websites/{website}/webshop"
type = "GET"
parameters.needed = ["website"]
parameters.optional = []

[[webador.documentation.methods]]
for = "List all websites available to the authenticated user"
endpoint = "/websites"
type = "GET"
parameters.needed = []
parameters.optional = []

[[webador.documentation.methods]]
for = "Retrieve a single accessible website by ID"
endpoint = "/websites/{website}"
type = "GET"
parameters.needed = ["website"]
parameters.optional = []