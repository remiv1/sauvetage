# Configuration des pages de l'application. Annuaire des pages.
[links]
dashboard = "dashboard.toml"
login = "user/login.toml"
stock = "stock.toml"
register = "user/register.toml"
change_password = "user/change_password.toml"

# ------------------------------------------------------------------------------
# --- Configuration par défaut si la page n'est pas trouvée
# ------------------------------------------------------------------------------
# Paramètres
[default.params]
styles = ["css/main.css"]
scripts = ["js/main.js"]
# Clées
[default.meta]
title = "Sauvetage | Intranet"
description = "Application de gestion de la librairie en ligne Editions du Sauvetage"
keywords = "sauvetage, intranet, gestion, librairie"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[default.meta.accessibility]
lang="fr"
direction="ltr"
aria_role="main"
# Pages spécifiques
[default.layout]
main_layout = "index.html"
extend_layout = ""
# Flags
[default.flags]
navbar = false
searchbar = false