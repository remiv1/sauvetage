# ------------------------------------------------------------------------------
# --- Configuration page d'accueil                                           ---
# ------------------------------------------------------------------------------
# Paramètres
[params]
tab = "Accueil"
styles = [
    "css/main.css",
    "css/home/home.css"
]
scripts = ["js/main.js"]
# Clées
[meta]
title = "Accueil | Intranet"
description = "Page d'accueil de l'intranet Sauvetage"
keywords = "accueil, home, intranet"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[meta.accessibility]
lang="fr"
direction="ltr"
aria_role="main"
# Pages spécifiques
[layout]
main_layout = "home/home.html"
extend_layout = "index.html"
# Flags pour afficher ou non les éléments sur les commons
[flags]
navbar = true
searchbar = false
userbar = true
