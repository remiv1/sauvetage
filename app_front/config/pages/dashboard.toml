# ------------------------------------------------------------------------------
# --- Configuration page de tableau de bord                                  ---
# ------------------------------------------------------------------------------
# Paramètres
[params]
tab = "Tableau de bord"
styles = [
    "css/dashboard/dashboard.css",
    "css/dashboard/orders.css",
    "css/dashboard/stocks.css",
    "css/main.css"
]
modules = [
    "js/dashboard/dashboard.js",
    "js/main.js"
]
# Clées
[meta]
title = "Tableau de bord | Intranet"
description = "Page de tableau de bord de l'intranet"
keywords = "tableau de bord, dashboard, intranet"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[meta.accessibility]
lang="fr"
direction="ltr"
aria_role="document"
# Pages spécifiques
[layout]
main_layout = "dashboard/dashboard.html"
extend_layout = "index.html"
# Flags pour afficher ou non les éléments sur les commons
[flags]
navbar = true
searchbar = true
userbar = true