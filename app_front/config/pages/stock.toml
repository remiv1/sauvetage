# ------------------------------------------------------------------------------
# --- Configuration page de gestion des stocks
# ------------------------------------------------------------------------------
# Paramètres
[params]
styles = ["css/stock.css", "css/base.css"]
scripts = ["js/stock.js", "js/base.js"]
# Clées
[meta]
title = "Gestion des stocks | Intranet"
description = "Page de gestion des stocks de l'intranet"
keywords = "gestion des stocks, stock management, intranet"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[meta.accessibility]
lang="fr"
direction="ltr"
aria_role="application"
# Pages spécifiques
[layout]
main_layout = "index.html"
# Flags
[flags]
navbar = false
searchbar = true
userbar = true