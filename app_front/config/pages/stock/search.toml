# ------------------------------------------------------------------------------
# --- Configuration page de recherche de stocks                               ---
# ------------------------------------------------------------------------------
# Paramètres
[params]
tab = "Stock"
styles = [
    "css/main.css",
    "css/stock/search.css"
]
scripts = ["js/main.js"]
# Clées
[meta]
title = "Stock | Intranet"
description = "Page de recherche de stocks de l'intranet Sauvetage"
keywords = "stock, recherche, intranet"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[meta.accessibility]
lang="fr"
direction="ltr"
aria_role="main"
# Pages spécifiques
[layout]
main_layout = "stock/search.html"
extend_layout = "index.html"
# Flags pour afficher ou non les éléments sur les commons
[flags]
navbar = true
searchbar = false
userbar = true
htmx = true
