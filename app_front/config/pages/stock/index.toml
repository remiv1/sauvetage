# ------------------------------------------------------------------------------
# --- Configuration page d'accueil                                           ---
# ------------------------------------------------------------------------------
# Paramètres
[params]
tab = "Stock"
styles = [
    "css/main.css",
    "css/home/home.css",
    "css/stock/home.css"
]
scripts = [
    "js/main.js"
]
# Clées
[meta]
title = "Stock | Intranet"
description = "Page d'accueil de la page de gestion de stock de l'intranet Sauvetage"
keywords = "stock, intranet, gestion de stock"
author = "Rémi Verschuur"
robots = "noindex, nofollow"
[meta.accessibility]
lang="fr"
direction="ltr"
aria_role="app"
# Pages spécifiques
[layout]
main_layout = "stock/index.html"
extend_layout = "index.html"
# Flags pour afficher ou non les éléments sur les commons
[flags]
navbar = true
searchbar = false
userbar = true
