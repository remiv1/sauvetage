[dilicom_principale]
service = "api principale"

[dilicom_principale.documentation]
api_url_prod = "https://hub-dilicom.centprod.com/v3/hub-numerique/"
api_url_test = "https://hub-test.centprod.com/v3/hub-numerique/"
type = ["REST", "SOAP"]

[dilicom_principale.documentation.return_codes]
OK = "Aucune erreur, le service a répondu normalement."
ERROR = "Une erreur non spécifiée a eu lieu."
WARNING = "Certains éléments sont en erreur (par exemple certaines lignes de commandes)."
INVALID_ARGUMENTS = "Les argument indiqués sont erronés, ou bien certains paramètres obligatoires ne sont pas renseignés."
DUPLICATED = "Un élément est en doublon (Ligne de commande, orderId). Pour plus d'information se référer aux détails des retours."
UNKNOWN_GLN = "Le GLN distributeur indiqué est inconnu."
ORDERID_NOT_FOUND = "l'orderId indiqué n'existe pas."
EAN_NOT_FOUND = "Le ou les EAN indiqués n'existent pas."
EAN_NOT_AVAILABLE = "Vous n'avez pas accès, ou pas le droit de commander cet EAN13."
PLATFORM_ACCES_DENIED = "Vous n'êtes pas abonné à ce distributeur."
AUTHENTICATION_ERROR = "Erreur d'authentification sur le Hub, votre code d'accès ou mot de passe est probablement erroné."
CANCELLED = "Une ligne de commande est annulée avec succès."
PRODUCT_NOT_IN_ORDER = "La ligne de commande à annuler n'existe pas."
ALREADY_DOWNLOADED = "Un des liens de téléchargement de l'article a déjà été utilisé, la ligne de commande ne peut donc plus être annulée."
SERVICE_NOT_PROVIDED = "Erreur survenue si le distributeur ne fournit pas le service d'annulation ou si le revendeur demande l'annulation des lignes de commande pour un distributeur qui n'accepte que l'annulation de commande complète, et que les lignes de la commande à annuler ne représentent pas l'intégralité de la commande."

[[dilicom_principale.documentation.methods]]
for = "Vérifier la disponibilité d'un ou plusieurs produits"
name = "checkAvailability"
endpoint = "json/checkAvailability"
type = "GET"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller", "glnContractor"]
optional = ["country"]

[dilicom_principale.documentation.methods.checkAvailabilityLine]
needed = ["ean13", "glnDistributor"]
optional = ["unitPrice", "unitPriceExcludingTax", "currency"]

[[dilicom_principale.documentation.methods]]
for = "Passage de commandes"
name = "sendOrder"
endpoint = "json/sendOrder"
type = "POST"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller", "orderId", "customerId"]
optional = ["glnGroup", "glnContractor", "glnDelivery"]

[dilicom_principale.documentation.methods.finalBookOwner]
needed = ["identifier", "civility", "lastName", "email", "country", "postalCode", "city"]
optional = ["firstName"]

[dilicom_principale.documentation.methods.orderRequestLine]
needed = ["ean13", "glnDistributor", "unitPrice", "quantity"]
optional = ["unitPriceExcludingTax", "currency", "lineReference", "specialCode"]

[[dilicom_principale.documentation.methods]]
for = "Annulation d'une commande"
name = "cancelOrder"
endpoint = "json/cancelOrder"
type = "POST"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller", "glnContractor", "orderId"]
optional = ["reason"]

[dilicom_principale.documentation.methods.cancelOrderLines]
needed = ["ean13", "glnDistributor"]

[dilicom_principale.documentation.methods.notes]
non_implemented_distributors = ["IKIOSQUE", "HARMATHEQUE", "OLF", "IZNEO"]
partial_cancellation_supported = ["EDEN", "DE MARQUE"]
partial_cancellation_not_supported = ["EDITIS", "DIALOGUES"]

[[dilicom_principale.documentation.methods]]
for = "Récupération des détails d'une commande"
name = "getOrderDetail"
endpoint = "json/getOrderDetail"
type = "GET"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller", "orderId"]
optional = ["glnContractor"]

[[dilicom_principale.documentation.methods]]
for = "Obtention des versions numériques associées à des EAN13 physiques"
name = "getDigitalVersions"
endpoint = "json/getDigitalVersions"
type = "POST"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller"]
optional = ["glnContractor"]

[dilicom_principale.documentation.methods.physicalEan]
needed = ["ean13"]
max = 12

[[dilicom_principale.documentation.methods]]
for = "Récupération des notices"
name = "getNotices"
endpoint = "json/getNotices"
type = "POST"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller"]
optional = ["glnGroup", "glnContractor", "sinceDate", "lastConnection"]

[[dilicom_principale.documentation.methods]]
for = "Obtention de notices ONIX d'une liste d'EAN13/distributeur"
name = "getDetailNotices"
endpoint = "json/getDetailNotices"
type = "POST"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller"]
optional = ["glnContractor"]

[dilicom_principale.documentation.methods.notice]
needed = ["ean13", "glnDistributor"]
max = 12

[[dilicom_principale.documentation.methods]]
for = "Chargement de la notice d'un produit directement au format ONIX"
name = "getNotice"
endpoint = "json/getNotice"
type = "GET"

[dilicom_principale.documentation.methods.parameters]
needed = ["glnReseller", "passwordReseller", "ean13", "glnDistributor"]
optional = ["glnContractor"]

[dilicom_recherche]
service = "api de recherche"

[dilicom_recherche.documentation]
description = "HUB Numérique : API de Recherche"
serviceDescription = "Permet d'effectuer une recherche rapide ou une recherche avancée"

[dilicom_recherche.documentation.addresses.soap]
test = "https://hub-test.centprod.com/v[version]/hub-numerique/hub-numerique-services-search.wsdl"
production = "https://hub-dilicom.centprod.com/v[version]/hub-numerique/hub-numerique-services-search.wsdl"

[dilicom_recherche.documentation.addresses]
rest = "Non implémenté"

[dilicom_recherche.documentation.parameters]
needed = ["glnReseller", "passwordReseller", "catalog"]
optional = ["glnContractor", "quickSearch", "includeNotice"]

[dilicom_recherche.documentation.parameters.pagination]
needed = ["nbResultsPerPage", "currentPage"]
optional = ["sortBy", "sortOrder"]

[dilicom_recherche.documentation.parameters.advancedSearch]
optional = ["availability", "title", "author", "publisher", "distributor", "ean13", "publicationSince", "keywords"]

[dilicom_recherche.documentation.response]
requestId = "optional"
returnStatus = "obligatory"
returnMessage = "optional"

[dilicom_recherche.documentation.response.paginationRs]
nbResultsPerPage = "obligatory"
currentPage = "obligatory"
sortBy = "optional"
sortOrder = "optional"
nbFoundResults = "obligatory"
nbSentResults = "obligatory"

[dilicom_recherche.documentation.response.detailNotice]
ean13 = "obligatory"
glnDistributor = "obligatory"
supplierName = "optional"
onixProduct = "optional"
type = "obligatory"

[dilicom_recherche.documentation.notes]
returnCodes = ["OK", "ERROR", "INVALID_ARGUMENTS", "AUTHENTICATION_ERROR", "ACCES_DENIED"]
