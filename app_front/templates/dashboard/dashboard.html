{% extends "index.html" %}
{% block content %}
<div class="dashboard">

  <!-- En-tête -->
  <div class="db-header">
    <div class="db-header__left">
      <h1 class="db-title">Tableau de bord</h1>
      <p class="db-subtitle" id="db-date"></p>
    </div>
    <button class="db-refresh-btn" id="db-refresh" aria-label="Rafraîchir les données">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      Rafraîchir
    </button>
  </div>

  <!-- Onglets de sélection -->
  <nav class="db-tabs" role="tablist" aria-label="Types de tableau de bord">

    <button class="db-tab active" role="tab" aria-selected="true"
            aria-controls="panel-general" id="tab-general" data-tab="general">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      Vue générale
    </button>

    <button class="db-tab" role="tab" aria-selected="false"
            aria-controls="panel-stocks" id="tab-stocks" data-tab="stocks">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
      </svg>
      Stocks
    </button>

    <button class="db-tab" role="tab" aria-selected="false"
            aria-controls="panel-commandes" id="tab-commandes" data-tab="commandes">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      Commandes
    </button>

    <button class="db-tab" role="tab" aria-selected="false"
            aria-controls="panel-clients" id="tab-clients" data-tab="clients">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      Clients
    </button>

    <button class="db-tab" role="tab" aria-selected="false"
            aria-controls="panel-fournisseurs" id="tab-fournisseurs" data-tab="fournisseurs">
      <svg class="db-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="1" y="3" width="15" height="13"></rect>
        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
        <circle cx="5.5" cy="18.5" r="2.5"></circle>
        <circle cx="18.5" cy="18.5" r="2.5"></circle>
      </svg>
      Fournisseurs
    </button>

  </nav>

  <!-- Panneaux de contenu -->
  <div class="db-panels">
    <section id="panel-general"      class="db-panel"        role="tabpanel" aria-labelledby="tab-general"></section>
    <section id="panel-stocks"       class="db-panel db-panel--hidden" role="tabpanel" aria-labelledby="tab-stocks"></section>
    <section id="panel-commandes"    class="db-panel db-panel--hidden" role="tabpanel" aria-labelledby="tab-commandes"></section>
    <section id="panel-clients"      class="db-panel db-panel--hidden" role="tabpanel" aria-labelledby="tab-clients"></section>
    <section id="panel-fournisseurs" class="db-panel db-panel--hidden" role="tabpanel" aria-labelledby="tab-fournisseurs"></section>
  </div>

</div>
{% endblock %}
