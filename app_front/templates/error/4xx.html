{% extends "index.html" %}

{% block content %}
  <section class="error-4xx" style="display:flex;align-items:center;justify-content:center;min-height:60vh;padding:2rem;">
    <div style="text-align:center;max-width:720px;">
      <img src="{{ url_for('static', filename='img/4xx.png') }}" alt="Illustration erreur {{ code }}" class="img-contain error-illustration"/>
      <h1 style="font-size:1.75rem;margin-top:1rem;color:#111827;">Erreur {{ code }}</h1>
      <p style="color:#6b7280;margin-top:0.5rem;">{{ message or 'La page que vous recherchez est introuvable ou la requête est incorrecte.' }}</p>
      <div style="margin-top:1.25rem;">
        <a href="{{ url_for('home') }}" class="btn btn-primary" style="padding:0.6rem 1rem;background:#0369a1;color:#fff;border-radius:6px;text-decoration:none;">Retour à l'accueil</a>
      </div>
    </div>
  </section>
{% endblock %}
