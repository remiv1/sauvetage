{% extends layout.extend_layout %}

{% block content %}
<div class="admin-container">
    <div class="h2-header">
        <div class="header-top">
            <a href="{{ url_for('admin.index') }}" class="btn btn-back" title="Retour à l'administration">
                {% include "svg/back.html" %}
            </a>
            <h2>Taux de TVA</h2>
        </div>
    </div>

    {# Filtres #}
    <details class="search-accordion">
        <summary class="accordion-toggle">
            {% with class="icone-24" %}{% include "svg/filter.html" %}{% endwith %}
            Filtres
        </summary>
        <form id="vat-search-filters"
              hx-get="{{ url_for('admin_vat.vat_table') }}"
              hx-target="#vat-table-wrapper"
              hx-swap="innerHTML"
              hx-trigger="submit"
              hx-include="#vat-search-filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label" for="filter-vat-code">Code TVA</label>
                    <select id="filter-vat-code" name="code" class="filter-control">
                        <option value="">Tous</option>
                        <option value="0">0 — Super-réduit (2,1%)</option>
                        <option value="1">1 — Réduit (5,5%)</option>
                        <option value="2">2 — Intermédiaire (10%)</option>
                        <option value="3">3 — Normal (20%)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label" for="filter-vat-active">Statut</label>
                    <select id="filter-vat-active" name="active_only" class="filter-control">
                        <option value="">Tous</option>
                        <option value="true">En vigueur</option>
                    </select>
                </div>
            </div>
            <div class="filters-actions">
                <button type="submit" class="btn btn-primary">
                    {% with class="icone-24" %}{% include "svg/search.html" %}{% endwith %} Rechercher
                </button>
                <button type="button" class="btn btn-secondary"
                        onclick="document.getElementById('vat-search-filters').reset(); htmx.trigger('#vat-table-wrapper', 'refreshVatTable');">
                    Réinitialiser
                </button>
            </div>
        </form>
    </details>

    {# Actions #}
    <div class="section-actions">
        <button class="btn btn-primary"
                hx-get="{{ url_for('admin_vat.vat_create_form') }}"
                hx-target="body"
                hx-swap="beforeend">
            {% with height=24 %}{% include "svg/plus.html" %}{% endwith %} Ajouter un taux
        </button>
    </div>

    {# Tableau #}
    <div id="vat-table-wrapper"
         hx-get="{{ url_for('admin_vat.vat_table') }}"
         hx-trigger="load, vat:created from:body, vat:updated from:body, vat:closed from:body, refreshVatTable"
         hx-swap="innerHTML">
        <div class="loading-indicator"><p>Chargement…</p></div>
    </div>
</div>
{% endblock %}
