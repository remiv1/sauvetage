{# Dropdown fournisseurs dans le contexte Dilicom (avec GLN13) #}
{% if suppliers is not none %}
    <!-- template dilicom_suppliers_dropdown.html -->
    {% for s in suppliers %}
    <div class="dropdown-item"
         hx-get="{{ url_for('supplier_htmx.select_dilicom_supplier', supplier_id=s.id, supplier_name=s.name, gln13=s.gln13) }}"
         hx-target="#dilicom-gln13"
         hx-swap="outerHTML">
        {{ s.name }}
        {% if s.gln13 %}<small class="text-muted"> — GLN : {{ s.gln13 }}</small>{% endif %}
    </div>
    {% endfor %}
{% else %}
    <!-- template dilicom_suppliers_dropdown.html - vide -->
    <div class="dropdown-item text-muted">Aucun fournisseur trouvé.</div>
{% endif %}
