<!-- template select_dilicom_supplier.html -->
{# OOB swaps pour la sélection d'un fournisseur dans le contexte Dilicom.
   - Élément principal : remplace #dilicom-gln13 (hidden GLN).
   - OOB 1 : met à jour le texte affiché dans #dilicom-supplier-name.
   - OOB 2 : vide #dilicom-supplier-results pour fermer le dropdown. #}
<input type="hidden" id="dilicom-gln13" name="gln13" value="{{ gln13 }}">
<input type="text" id="dilicom-supplier-name"
       class="form-control"
       placeholder="Rechercher un fournisseur…"
       autocomplete="off"
       hx-get="{{ url_for('supplier_htmx.get_suppliers', type_of_data='id_name_gln') }}"
       hx-trigger="keyup changed delay:300ms"
       hx-target="#dilicom-supplier-results"
       hx-swap="innerHTML"
       name="supplier_name"
       value="{{ supplier_name }}"
       hx-swap-oob="true">
<div id="dilicom-supplier-results" class="search-dropdown" hx-swap-oob="true"></div>
