{# Fragment HTMX — Dropdown autocomplete pour les tags avec option de création #}
{% if results %}
    {% for tag in results %}
    <button type="button" class="dropdown-item tag-select-btn"
            data-tag-id="{{ tag.id }}"
            data-tag-name="{{ tag.name|e }}">
        {{ tag.name }}{% if tag.description %} - {{ tag.description }}{% endif %}
    </button>
    {% endfor %}
{% else %}
    <div class="dropdown-item text-muted">Aucun résultat</div>
{% endif %}
<button type="button" class="dropdown-item dropdown-item-create toggle-create-form-btn">
    ✨ Créer un mot-clé
</button>
<div class="tag-create-form" style="display:none; padding: .5rem;">
    <input type="text" class="form-control tag-new-name"
           placeholder="Nom du mot-clé" value="{{ query|e }}">
    <input type="text" class="form-control tag-new-desc"
           placeholder="Description" style="margin-top:.3rem;">
    <button type="button" class="btn btn-sm btn-primary"
            style="margin-top:.4rem;"
            onclick="createTag(this)">
        Créer
    </button>
</div>
