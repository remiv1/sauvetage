<!-- SVG d'icone représentant une flèche entrant dans un carton (réception) -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
        viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Carton ouvert : base + côtés -->
    <polyline points="21 8 21 21 3 21 3 8"></polyline>
    <!-- Rabats du carton -->
    <polyline points="1 8 12 2 23 8"></polyline>
    <line x1="12" y1="2" x2="12" y2="8"></line>
    <!-- Flèche vers le bas entrant dans le carton -->
    <line x1="12" y1="10" x2="12" y2="17"></line>
    <polyline points="9 14 12 17 15 14"></polyline>
</svg>
