        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/statements/email:
    post:
      tags:
        - contacts
      operationId: email_statement
      summary: Email Statement
      description: Email statement to the contact. If JSONString is not inputted, mail will be sent with the default mail content.
      parameters:
        - name: start_date
          in: query
          description: If start_date and end_date are not given, current month's statement will be sent to contact. <code>Date format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: end_date
          in: query
          description: End date for the statement. <code>Date format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: multipart_or_formdata
          in: query
          description: Files to be attached along with the statement.
          required: false
          schema:
            type: string
          example: file
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/email-statement-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/email-statement-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.CREATE
    get:
      tags:
        - contacts
      operationId: get_statement_mail_content
      summary: Get Statement Mail Content
      description: Get the mail content of a contacts billing statement.
      parameters:
        - name: start_date
          in: query
          description: If start_date and end_date are not given, current month's statement will be sent to contact. <code>Date format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: end_date
          in: query
          description: End date for the statement. <code>Date format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: ''
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-statement-mail-content-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    parameters:
      - name: contact_id
        in: path
        required: true
        description: Unique identifier of the contact.
        schema:
          type: string
        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/email:
    post:
      tags:
        - contacts
      operationId: email_contact
      summary: Email Contact
      description: Send email to contact.
      parameters:
        - name: send_customer_statement
          in: query
          description: Send customer statement pdf with email.
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/email-contact-request'
      responses:
