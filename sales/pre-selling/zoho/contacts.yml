    parameters:
      - name: contact_id
        in: path
        required: true
        description: Unique identifier of the contact.
        schema:
          type: string
        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/address:
    get:
      tags:
        - contacts
      operationId: get_contact_addresses
      summary: Get Contact Addresses
      description: Get addresses of a contact including its Shipping Address, Billing Address and other additional addresses.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-contact-addresses-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    post:
      tags:
        - contacts
      operationId: create_additional_address
      summary: Add Additional Address
      description: Add an additional address for a contact using the arguments below.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/add-additional-address-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/add-additional-address-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.CREATE
    parameters:
      - name: contact_id
        in: path
        required: true
        description: Unique identifier of the contact.
        schema:
          type: string
        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/address/{address_id}:
    put:
      tags:
        - contacts
      operationId: update_additional_address
      summary: Edit Additional Address
      description: Edit the additional address of a contact using the arguments below.
      parameters:
        - name: address_id
          in: path
          required: true
          description: Unique identifier of the address.
          schema:
            type: string
          example: 1053791000000186000
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edit-additional-address-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/edit-additional-address-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.UPDATE
    delete:
      tags:
        - contacts
      operationId: delete_additional_address
      summary: Delete Additional Address
      description: Delete the additional address of a contact.
      parameters:
        - name: address_id
          in: path
          required: true
          description: Unique identifier of the address.
          schema:
            type: string
          example: 1053791000000186000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-additional-address-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.DELETE
    parameters:
      - name: contact_id
        in: path
        required: true
        description: Unique identifier of the contact.
        schema:
          type: string
        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/refunds:
    get:
      tags:
        - contacts
      operationId: list_contact_refunds
      summary: List Refunds
      description: List the refund history of a contact.
      parameters:
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
