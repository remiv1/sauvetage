      - $ref: '#/components/parameters/organization_id'
  /clientreviews:
    get:
      tags:
        - contacts
      operationId: list_client_reviews
      summary: View All Client Reviews
      description: View the list of all client reviews for a particular contact.
      parameters:
        - name: contact_id
          in: query
          description: Unique ID of a particular contact.
          required: false
          schema:
            type: integer
            format: int64
          example: 460000000026049
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/view-all-client-reviews-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /clientreviews/{comment_id}:
    get:
      tags:
        - contacts
      operationId: get_client_review
      summary: Details of a Particular Client Review
      description: View the details of a particular client review.
      parameters:
        - name: contact_id
          in: query
          description: Unique ID of a particular contact.
          required: false
          schema:
            type: integer
            format: int64
          example: 460000000026049
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/details-of-a-particular-client-review-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    parameters:
      - name: comment_id
        in: path
        required: true
        description: Unique identifier of the comment.
        schema:
          type: string
        example: 460000000053131
      - $ref: '#/components/parameters/organization_id'
  /clientreviews/{comment_id}/comment:
    post:
      tags:
