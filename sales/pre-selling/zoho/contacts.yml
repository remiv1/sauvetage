openapi: 3.0.0
info:
  title: Contacts
  description: 'A contact is either a customer or vendor. A contact can be an individual or a business in general.<br><br><b>Possible error codes: </b><br><table><thead><tr><th>Error Code</th><th>Message</th></tr></thead><tbody><tr><td><span style="color:#FF0000;"> 1002</span></td><td>Contact does not exist</td></tr><tr><td><span style="color:#FF0000;"> 3000</span></td><td>This contact cannot be deleted since you have recorded transactions for it</td></tr><tr><td><span style="color:#FF0000;"> 3013</span></td><td>Enter a valid Contact Name</td></tr><tr><td><span style="color:#FF0000;"> 3062</span></td><td>The contact already exists.Please specify a different name</td></tr><tr><td><span style="color:#FF0000;"> 9004</span></td><td>This currency does not exist. Please choose a valid currency</td></tr><tr><td><span style="color:#FF0000;"> 31006</span></td><td>Portal is disabled for your organization. Please contact support@zohoinvoice.com to enable it</td></tr></tbody></table>'
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/invoice/v3
    description: API Endpoint
tags:
  - name: contacts
    description: Contacts Module
paths:
  /contacts:
    post:
      tags:
        - contacts
      operationId: create_contact
      summary: Create a Contact
      description: Create a contact with given information.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-a-contact-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-a-contact-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.CREATE
    get:
      tags:
        - contacts
      operationId: list_contacts
      summary: List Contacts
      description: List all contacts with pagination.
      parameters:
        - name: contact_name
          in: query
          description: 'Search contacts by contact name. <code>Maximum length [100]</code> Variants: <code>contact_name_startswith</code> and <code>contact_name_contains</code>. Maximum length [100]'
          required: false
          schema:
            type: string
          example: Bowman and Co
        - name: company_name
          in: query
          description: 'Search contacts by company name. <code>Maximum length [100]</code> Variants: <code>company_name_startswith</code> and <code>company_name_contains</code>'
          required: false
          schema:
            type: string
          example: Bowman and Co
        - name: first_name
          in: query
          description: 'Search contacts by first name of the contact person. <code>Maximum length [100]</code> Variants: <code>first_name_startswith</code> and <code>first_name_contains</code>'
          required: false
          schema:
            type: string
          example: Will
        - name: last_name
          in: query
          description: 'Search contacts by last name of the contact person. <code>Maximum length [100]</code> Variants: <code>last_name_startswith</code> and <code>last_name_contains</code>'
          required: false
          schema:
            type: string
          example: Smith
        - name: address
          in: query
          description: 'Search contacts by any of the address fields. <code>Maximum length [100]</code> Variants: <code>address_startswith</code> and <code>address_contains</code>'
          required: false
          schema:
            type: string
          example: 4900 Hopyard Rd, Suite 310
        - name: email
          in: query
          description: 'Search contacts by email id of the contact person. <code>Maximum length [100]</code> Variants: <code>address_startswith</code> and <code>address_contains</code>'
          required: false
          schema:
            type: string
          example: test@zylker.org
        - name: phone
          in: query
          description: 'Search contacts by phone number of the contact person. <code>Maximum length [100]</code> Variants: <code>phone_startswith</code> and <code>phone_contains</code>'
          required: false
          schema:
            type: string
          example: '1234'
        - name: filter_by
          in: query
          description: 'Filter contacts by status. Allowed Values: <code>Status.All, Status.Active, Status.Inactive, Status.Duplicate and Status.Crm</code>'
          required: false
          schema:
            type: string
          example: ''
        - name: search_text
          in: query
          description: Search contacts by contact name or notes. <code>Maximum length [100]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: sort_column
          in: query
          description: 'Sort contacts. Allowed Values: <code>contact_name, first_name, last_name, email, outstanding_receivable_amount, created_time and last_modified_time</code>'
          required: false
          schema:
            type: string
          example: contact_name
        - name: zcrm_contact_id
          in: query
          description: CRM Contact ID for the contact.
          required: false
          schema:
            type: string
          example: 460000000026049
        - name: zcrm_account_id
          in: query
          description: CRM Account ID for the contact.
          required: false
          schema:
            type: string
          example: 460000000026049
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-contacts-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}:
    put:
      tags:
        - contacts
      operationId: update_contact
      summary: Update a Contact
      description: Update an existing contact. To delete a contact person remove it from the contact_persons list.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-contact-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-contact-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.UPDATE
    get:
      tags:
        - contacts
      operationId: get_contact
      summary: Get a Contact
      description: Get details of a Contact.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-a-contact-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.READ
    delete:
      tags:
        - contacts
      operationId: delete_contact
      summary: Delete a Contact
      description: Delete an existing Contact.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-contact-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.contacts.DELETE
    parameters:
      - name: contact_id
        in: path
        required: true
        description: Unique identifier of the contact.
        schema:
          type: string
        example: 460000000026049
      - $ref: '#/components/parameters/organization_id'
  /contacts/{contact_id}/active:
    post:
      tags:
        - contacts
      operationId: mark_as_contact_active
      summary: Mark as Active
      description: Mark a contact as active.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mark-as-active-response'
      deprecated: false
      security:
        - Zoho_Auth:
