openapi: 3.0.0
info:
  title: Customer Payments
  description: 'A payment object describes details regarding a particular customer payment. There can be multiple payments for a single invoice. Multiple invoices can be paid in a single payment as well.<br><br><b>Possible error codes: </b><br><table><thead><tr><th>Error Code</th><th>Message</th></tr></thead><tbody><tr><td><span style="color:#FF0000;"> 3004</span></td><td>The Customer field can neither be blank nor incorrect. Please enter a correct Customer</td></tr><tr><td><span style="color:#FF0000;"> 9521</span></td><td>Partial payment for retainer invoice is not allowed. Please record the full payment</td></tr><tr><td><span style="color:#FF0000;"> 9523</span></td><td>Payment amount made to retainer invoice cannot be changed. You could instead delete it and add it back</td></tr><tr><td><span style="color:#FF0000;"> 24016</span></td><td>The amount entered is more than the balance due for this invoice</td></tr></tbody></table>'
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/invoice/v3
    description: API Endpoint
tags:
  - name: customer-payments
    description: Customer-Payments Module
paths:
  /customerpayments:
    post:
      tags:
        - customer-payments
      operationId: create_customer_payment
      summary: Create a payment
      description: Create a new payment.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-a-payment-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-a-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.CREATE
    get:
      tags:
        - customer-payments
      operationId: list_customer_payments
      summary: List Customer Payments
      description: List all the payments made by your customer.
      parameters:
        - name: customer_name
          in: query
          description: 'Search payments by customer name. Variants: <code>customer_name_startswith</code> and <code>customer_name_contains</code>. <code>Maximum length [100]</code>'
          required: false
          schema:
            type: string
          example: Bowman Furniture
        - name: reference_number
          in: query
          description: 'Search payments by reference number. Variants: <code>reference_number_startswith</code> and <code>reference_number_contains</code>. <code>Maximum length [100]</code>'
          required: false
          schema:
            type: string
          example: INV-384
        - name: date
          in: query
          description: Date on which payment is made. <code>Date Format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: '2016-06-05'
        - name: amount
          in: query
          description: 'Search payments by payment amount. Variants: <code>amount_less_than</code>, <code>amount_less_equals</code>, <code>amount_greater_than</code> and <code>amount_greater_equals</code>'
          required: false
          schema:
            type: number
            format: double
          example: 450
        - name: notes
          in: query
          description: 'Search payments by customer notes. Variants: <code>notes_startswith</code> and <code>notes_contains</code>'
          required: false
          schema:
            type: string
          example: ''
        - name: payment_mode
          in: query
          description: 'Search payments by payment mode. Variants: <code>payment_mode_startswith</code> and <code>payment_mode_contains</code>'
          required: false
          schema:
            type: string
          example: cash
        - name: filter_by
          in: query
          description: 'Filter payments by mode.Allowed Values: <code>PaymentMode.All</code>, <code>PaymentMode.Check</code>, <code>PaymentMode.Cash</code>, <code>PaymentMode.BankTransfer</code>, <code>PaymentMode.Paypal</code>, <code>PaymentMode.CreditCard</code>, <code>PaymentMode.GoogleCheckout</code>, <code>PaymentMode.Credit</code>, <code>PaymentMode.Authorizenet</code>, <code>PaymentMode.BankRemittance</code>, <code>PaymentMode.Payflowpro</code>, <code>PaymentMode.Stripe</code>, <code>PaymentMode.TwoCheckout</code>, <code>PaymentMode.Braintree</code> and <code>PaymentMode.Others</code>'
          required: false
          schema:
            type: string
          example: ''
        - name: sort_column
          in: query
          description: Sort based on selected column
          required: false
          schema:
            type: string
          example: created_time
        - name: search_text
          in: query
          description: Search payments by reference number or customer name or payment description. <code>Maximum length [100]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-customer-payments-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /customerpayment/{customer_payment_id}/customfields:
    put:
      tags:
        - customer-payments
      operationId: update_custom_field_in_customer_payment
      summary: Update custom field in existing customerpayments
      description: Update the value of the custom field in existing customerpayments.
      parameters:
        - name: customer_payment_id
          in: path
          required: true
          description: Unique identifier of the customer payment.
          schema:
            type: string
          example: '9030000079467'
        - $ref: '#/components/parameters/organization_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/custom_fields_update'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-an-customerpayment-customfield-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.UPDATE
  /customerpayments/{payment_id}:
    put:
      tags:
        - customer-payments
      operationId: update_customer_payment
      summary: Update a payment
      description: Update an existing payment information.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-payment-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.UPDATE
    get:
      tags:
        - customer-payments
      operationId: get_customer_payment
      summary: Retrieve a payment
      description: Details of an existing payment.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retrieve-a-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.READ
    delete:
      tags:
        - customer-payments
      operationId: delete_customer_payment
      summary: Delete a payment
      description: Delete an existing payment.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.DELETE
    parameters:
      - name: payment_id
        in: path
        required: true
        description: Unique identifier of the payment.
        schema:
          type: string
        example: '9030000079467'
      - $ref: '#/components/parameters/organization_id'
  /customerpayments/{customer_payment_id}/refunds:
    get:
      tags:
        - customer-payments
      operationId: list_customer_payment_refunds
      summary: List refunds of a customer payment
      description: List all the refunds pertaining to an existing customer payment.
      parameters:
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-refunds-of-a-customer-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.READ
    post:
      tags:
        - customer-payments
      operationId: refund_customer_payment
      summary: Refund an excess customer payment
      description: Refund the excess amount paid by the customer.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refund-an-excess-customer-payment-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refund-an-excess-customer-payment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.CREATE
    parameters:
      - name: customer_payment_id
        in: path
        required: true
        description: Unique identifier of the customer payment.
        schema:
          type: string
        example: '9030000079467'
      - $ref: '#/components/parameters/organization_id'
  /customerpayments/{customer_payment_id}/refunds/{refund_id}:
    get:
      tags:
        - customer-payments
      operationId: get_customer_payment_refund
      summary: Details of a refund
      description: Obtain details of a particular refund of a customer payment.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/details-of-a-refund-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.READ
    put:
      tags:
        - customer-payments
      operationId: update_customer_payment_refund
      summary: Update a refund
      description: Update the refunded transaction.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-refund-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-refund-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.UPDATE
    delete:
      tags:
        - customer-payments
      operationId: delete_customer_payment_refund
      summary: Delete a Refund
      description: Delete refund pertaining to an existing customer payment.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-refund-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.customerpayments.DELETE
    parameters:
      - name: customer_payment_id
        in: path
        required: true
        description: Unique identifier of the customer payment.
        schema:
          type: string
        example: '9030000079467'
      - name: refund_id
        in: path
        required: true
        description: Unique identifier of the refund.
        schema:
          type: string
        example: '3000000003017'
      - $ref: '#/components/parameters/organization_id'
components:
  parameters:
    organization_id:
      name: X-com-zoho-invoice-organizationid
      description: ID of the organization
      in: header
      required: true
      schema:
        type: string
      example: '10234695'
  schemas:
    gendoc-attributes-schema:
      $ref: '#/components/schemas/payment-response'
    payment-response:
      description: Payment details of the transaction
      type: object
      properties:
        payment_id:
          $ref: '#/components/schemas/payment_id'
        payment_mode:
          $ref: '#/components/schemas/payment_mode'
        amount:
          $ref: '#/components/schemas/amount'
        amount_refunded:
          $ref: '#/components/schemas/amount_refunded'
        bank_charges:
          $ref: '#/components/schemas/bank_charges'
        date:
          $ref: '#/components/schemas/date'
        status:
          $ref: '#/components/schemas/status'
        reference_number:
          $ref: '#/components/schemas/reference_number'
        description:
          $ref: '#/components/schemas/description'
        customer_id:
          $ref: '#/components/schemas/customer_id'
        customer_name:
          $ref: '#/components/schemas/customer_name'
        email:
          $ref: '#/components/schemas/email'
        invoices:
          description: Invoice related to a payment
          type: array
          items:
            type: object
            properties:
              invoice_id:
                $ref: '#/components/schemas/invoice_id'
              invoice_payment_id:
                $ref: '#/components/schemas/invoice_payment_id'
              invoice_number:
                $ref: '#/components/schemas/invoice_number'
              date:
                description: Date on which the invoice was raised.
                example: '2016-06-05'
              invoice_amount:
                $ref: '#/components/schemas/invoice_amount'
              amount_applied:
                $ref: '#/components/schemas/amount_applied'
              balance_amount:
                $ref: '#/components/schemas/balance_amount'
        currency_code:
          $ref: '#/components/schemas/currency_code'
        currency_symbol:
          $ref: '#/components/schemas/currency_symbol'
        custom_fields:
          $ref: '#/components/schemas/custom_fields'
    payment_id:
      description: Unique ID of the payment generated by the server. <code>Maximum length allowed [2000]</code>
      type: string
      example: '9030000079467'
    payment_mode:
      description: Mode through which payment is made. This can be <code>check</code>, <code>cash</code>, <code>creditcard</code>, <code>banktransfer</code>, <code>bankremittance</code>, <code>autotransaction</code> or <code>others</code>. <code>Maximum length [100]</code>
      type: string
      example: cash
    amount:
      description: Amount paid in the respective payment.
      type: number
      format: double
      example: 450
    amount_refunded:
      description: Amount that is refunded. Refunds are applicable only for payments whose payment_mode is <code>autotransaction</code>. Refunds would be made to the respective card provided by the customer.
      type: number
      format: double
      example: 50
    date:
      description: Date on which payment is made. <code>Date Format [yyyy-mm-dd]</code>
      type: string
      example: '2016-06-05'
    status:
      description: Status of the payment. It can either be <code>success</code> or <code>failure</code>.
      type: string
      example: success
    reference_number:
      description: Reference number generated for the payment. A string of your choice can also be used as the reference number. <code>Maximum length of the reference number [100]</code>
      type: string
      example: INV-384
    description:
      description: Description about the payment.
      type: string
      example: Payment has been added to INV-384
    customer_id:
      description: Customer ID of the customer involved in the payment.
      type: string
      example: '903000000000099'
    customer_name:
      description: Name of the customer to whom the invoice is raised. <code>Maximum length [100]</code>
      type: string
      example: Bowman Furniture
    email:
      description: Email address of the customer involved in the payment.
      type: string
      example: test@zylker.org
    autotransaction:
      description: If the payment mode is <code>autotransaction</code>, autotransaction information will be displayed in the autotransaction object. It contains <code>autotransaction_id</code>, <code>payment_gateway</code>, <code>gateway_transaction_id</code>, <code>card_id</code>, <code>last_four_digits</code>, <code>expiry_month</code> and <code>expiry_year</code>.
      type: object
      example: If the payment mode is <code>autotransaction</code>, autotransaction information will be displayed in the autotransaction object. It contains <code>autotransaction_id</code>, <code>payment_gateway</code>, <code>gateway_transaction_id</code>, <code>card_id</code>, <code>last_four_digits</code>, <code>expiry_month</code> and <code>expiry_year</code>.
    autotransaction_id:
      description: Auto-transaction ID generated for the payment made.
      type: string
      example: '90300000079465'
    payment_gateway:
      description: Name of the payment gateway associated with payment.
      type: string
      example: payflow_pro
    gateway_transaction_id:
      description: Transaction ID provided by the gateway for the transaction.
      type: string
      example: B10E6E0F31BD
    gateway_error_message:
      description: Gateway error message for a failed transaction.
      type: string
      example: Gateway error message for a failed transaction.
    card_id:
      description: Card ID of the card associated with the transaction.
      type: string
      example: '90300000079226'
    last_four_digits:
      description: Last four digits of the card.
      type: integer
      example: 1111
    expiry_month:
      description: Expiry month of the card.
      type: integer
      example: 9
    expiry_year:
      description: Expiry year of the card.
      type: integer
      example: 2030
    invoices:
      description: List of invoices associated with the payment. Each invoice object contains <code>invoice_id</code>, <code>invoice_number</code>, <code>date</code>, <code>invoice_amount</code>, <code>amount_applied</code> and <code>balance_amount</code>.
      type: array
      items:
        type: object
        properties:
          invoice_id:
            $ref: '#/components/schemas/invoice_id'
          invoice_number:
            $ref: '#/components/schemas/invoice_number'
          date:
            description: Date on which the invoice was raised.
            example: '2016-06-05'
          invoice_amount:
            $ref: '#/components/schemas/invoice_amount'
          amount_applied:
            $ref: '#/components/schemas/amount_applied'
          balance_amount:
            $ref: '#/components/schemas/balance_amount'
    invoice_id:
      description: Invoice ID of the required invoice.
      type: string
      example: '90300000079426'
    invoice_payment_id:
      description: Payment ID of the invoice.
      type: string
      example: '27161000000203281'
    invoice_number:
      description: Unique ID (starts with INV) of an invoice.
      type: string
      example: INV-384
    invoice_amount:
      description: Total amount raised for the invoice.
      type: number
      format: double
      example: 450
    amount_applied:
      description: Amount paid for the invoice.
      type: number
      format: double
      example: 450
    balance_amount:
      description: Unpaid amount of the invoice.
      type: number
      format: double
      example: 0
    currency_code:
      description: Currency code in which the payment is made.
      type: string
      example: USD
    currency_symbol:
      description: Customer's currency symbol.
      type: string
      example: $
    exchange_rate:
      description: Exchange rate for the currency used in the invoices and customer's currency. The payment amount would be the multiplicative product of the original amount and the exchange rate.
      type: number
      format: double
      example: 1
      default: 1
    payment_form:
      description: Mode of Vendor Payment
      type: string
      example: cash
      x-node_available_in:
        - mx
      x-node_unavailable_in: []
    bank_charges:
      description: Denotes any additional bank charges.
      type: number
      format: double
      example: 10
    created_time:
      description: Time when the payment was created.
      type: string
      example: 2016-06-05T02:15:20-0700
    updated_time:
      description: Time when the payment details were last updated.
      type: string
      example: 2016-07-05T02:15:20-0700
    customfield_id:
      description: Unique ID of the custom field
      type: integer
      format: int64
      example: 439910000000236000
    data_type:
      description: Data type of the custom field
      type: string
      example: number
    label:
      description: Name of the custom field
      type: string
      example: Record Number
    show_on_pdf:
      description: Enable/Disable show this custom field on pdf for that invoice
      type: boolean
      example: true
    show_in_all_pdf:
      description: Enable/Disable show this custom field on all the pdf
      example: true
    value:
      description: Value of the custom field
      type: integer
      example: 23
    index:
      description: The index of the custom field
      type: integer
      example: 1
    custom_fields:
      description: Custom fields for a payment received.
      type: array
      items:
        type: object
        properties:
          customfield_id:
            $ref: '#/components/schemas/customfield_id'
          data_type:
            $ref: '#/components/schemas/data_type'
          index:
            $ref: '#/components/schemas/index'
          label:
            $ref: '#/components/schemas/label'
          show_on_pdf:
            $ref: '#/components/schemas/show_on_pdf'
          show_in_all_pdf:
            $ref: '#/components/schemas/show_in_all_pdf'
          value:
            $ref: '#/components/schemas/value'
    custom_fields_update:
      description: Custom fields for an payments.
      type: array
      items:
        type: object
        properties:
          customfield_id:
            type: integer
            format: int64
            example: '46000000012845'
          value:
            $ref: '#/components/schemas/value'
    update-an-customerpayment-customfield-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: Custom Fields Updated Successfully
          readOnly: true
    payment_refund_id:
      description: A unique ID for the payment refund generated by the server.
      type: string
      example: '3000000003017'
    refund_mode:
      description: The method of refund. <code>Maximum length [50]</code>
      type: string
      example: cash
    payment_number:
      description: Number for the payment.
      type: string
      example: '2'
    amount_bcy:
      description: Amount in base currency
      type: integer
      example: 10
    amount_fcy:
      description: Amount in foreign currency
      type: integer
      example: 10
    page:
      description: Total number of pages
      type: integer
      example: 1
    per_page:
      description: Values per page
      type: integer
      example: 200
    report_name:
      description: Name of the report requested
      type: string
      example: Customer Payments Refund
    has_more_page:
      description: Boolean to check for additional pages
      type: boolean
      example: false
    sort_order:
      description: Ordering of sorting the invoices
      type: string
      example: D
    sort_column:
      description: Sort based on selected column
      type: string
      example: created_time
    notes:
      description: 'Search payments by customer notes. Variants: <code>notes_startswith</code> and <code>notes_contains</code>'
      type: string
    search_text:
      description: Search payments by reference number or customer name or payment description. <code>Maximum length [100]</code>
      type: string
    filter_by:
      description: 'Filter payments by mode.Allowed Values: <code>PaymentMode.All</code>, <code>PaymentMode.Check</code>, <code>PaymentMode.Cash</code>, <code>PaymentMode.BankTransfer</code>, <code>PaymentMode.Paypal</code>, <code>PaymentMode.CreditCard</code>, <code>PaymentMode.GoogleCheckout</code>, <code>PaymentMode.Credit</code>, <code>PaymentMode.Authorizenet</code>, <code>PaymentMode.BankRemittance</code>, <code>PaymentMode.Payflowpro</code>, <code>PaymentMode.Stripe</code>, <code>PaymentMode.TwoCheckout</code>, <code>PaymentMode.Braintree</code> and <code>PaymentMode.Others</code>'
      type: string
    bcy_amount:
      type: string
      example: 450
    create-a-payment-request:
      required:
        - customer_id
        - payment_mode
        - amount
        - invoices
        - date
      type: object
      properties:
        customer_id:
          $ref: '#/components/schemas/customer_id'
        payment_mode:
          $ref: '#/components/schemas/payment_mode'
        amount:
          $ref: '#/components/schemas/amount'
        date:
          $ref: '#/components/schemas/date'
        reference_number:
          $ref: '#/components/schemas/reference_number'
        description:
          $ref: '#/components/schemas/description'
        invoices:
          description: List of invoices associated with the payment. Each invoice object contains <code>invoice_id</code>, <code>invoice_number</code>, <code>date</code>, <code>invoice_amount</code>, <code>amount_applied</code> and <code>balance_amount</code>.
          type: array
          items:
            type: object
            required:
              - invoice_id
              - amount_applied
            properties:
              invoice_id:
                $ref: '#/components/schemas/invoice_id'
              amount_applied:
                $ref: '#/components/schemas/amount_applied'
        exchange_rate:
          $ref: '#/components/schemas/exchange_rate'
        payment_form:
          $ref: '#/components/schemas/payment_form'
        bank_charges:
          $ref: '#/components/schemas/bank_charges'
        custom_fields:
          description: Custom fields for a payment received.
          type: array
          items:
            type: object
            properties:
              label:
                $ref: '#/components/schemas/label'
              value:
                $ref: '#/components/schemas/value'
    create-a-payment-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: The payment has been created.
