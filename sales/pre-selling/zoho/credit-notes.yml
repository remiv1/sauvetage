        in: path
        required: true
        description: Unique identifier of the credit note.
        schema:
          type: string
        example: '90300000072369'
      - name: comment_id
        in: path
        required: true
        description: Unique identifier of the comment.
        schema:
          type: string
        example: '982000000570001'
      - $ref: '#/components/parameters/organization_id'
  /creditnotes/refunds:
