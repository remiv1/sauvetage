      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-credit-note-templates-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.READ
    parameters:
