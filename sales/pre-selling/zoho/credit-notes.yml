openapi: 3.0.0
info:
  title: Credit Notes
  description: 'A credit note is a promisory note issued to a person, when we owe him money. Credit notes are created when a refund is to be made to a customer. A credit note object allows you to keep track of all credit note related information.<br><br><b>Possible error codes: </b><br><table><thead><tr><th>Error Code</th><th>Message</th></tr></thead><tbody><tr><td><span style="color:#FF0000;"> 1002</span></td><td>Credit Note does not exists</td></tr><tr><td><span style="color:#FF0000;"> 12003</span></td><td>Credit notes that are in closed status cannot be applied to invoices</td></tr><tr><td><span style="color:#FF0000;"> 12004</span></td><td>Credit notes that are in void status cannot be applied to invoices</td></tr><tr><td><span style="color:#FF0000;"> 12005</span></td><td>Credits cannot be applied to invoices in the draft status</td></tr><tr><td><span style="color:#FF0000;"> 12006</span></td><td>Credits cannot be applied to invoices in the closed status</td></tr><tr><td><span style="color:#FF0000;"> 12007</span></td><td>Credits cannot be applied to invoices in the void status</td></tr><tr><td><span style="color:#FF0000;"> 12018</span></td><td>The specified Credit Note Number already exists</td></tr></tbody></table>'
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/invoice/v3
    description: API Endpoint
tags:
  - name: credit-notes
    description: Credit-Notes Module
paths:
  /creditnotes:
    post:
      tags:
        - credit-notes
      operationId: create_credit_note
      summary: Create a credit note
      description: Details of an existing creditnote.
      parameters:
        - name: invoice_id
          in: query
          description: Invoice ID of the required invoice.
          required: false
          schema:
            type: string
          example: '90300000079426'
        - name: ignore_auto_number_generation
          in: query
          description: Set to true if you need to provide your own credit note number.
          required: false
          schema:
            type: boolean
          example: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-a-credit-note-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-a-credit-note-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.CREATE
    get:
      tags:
        - credit-notes
      operationId: list_credit_notes
      summary: List Credit Notes
      description: List all the Credit Notes.
      parameters:
        - name: creditnote_number
          in: query
          description: Unique number generated (starts with CN) which will be displayed in the interface and credit notes. <code>Maximum Length [100]</code>
          required: false
          schema:
            type: string
          example: CN-29
        - name: date
          in: query
          description: The date on which credit note is raised. <code>Date Format [yyyy-mm-dd]</code>
          required: false
          schema:
            type: string
          example: '2016-06-05'
        - name: status
          in: query
          description: Status of the credit note. This can be <code>open</code>, <code>closed</code> or <code>void</code>.
          required: false
          schema:
            type: string
          example: open
        - name: total
          in: query
          description: Total credits raised in this credit note.
          required: false
          schema:
            type: number
            format: double
          example: 450
        - name: reference_number
          in: query
          description: Reference number generated for the payment. A string of your choice can also be used as the reference number. <code>Maximum Length [100]</code>
          required: false
          schema:
            type: string
          example: INV-384
        - name: customer_name
          in: query
          description: Name of the customer to whom the credit note is raised. <code>Maximum Length of the name [100]</code>
          required: false
          schema:
            type: string
          example: Bowman Furniture
        - name: item_name
          in: query
          description: Search credit notes by item name. <code>Maximum length [100]</code>
          required: false
          schema:
            type: string
          example: kit
        - name: customer_id
          in: query
          description: Customer ID of the customer for whom the credit note is raised.
          required: false
          schema:
            type: string
          example: '903000000000099'
        - name: item_description
          in: query
          description: description for the item. Variants <code>item_description_startswith</code> and <code>item_description_contains</code>. <code>Maximum length [100]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: item_id
          in: query
          description: Unique string generated for the item to which a refund is to be made.
          required: false
          schema:
            type: string
          example: '90300000081501'
        - name: filter_by
          in: query
          description: Filter credit notes by status. Allowed values <code>Status.All</code> <code>Status.Open</code> <code>Status.Draft</code> <code>Status.Closed</code> and <code>Status.Void</code>
          required: false
          schema:
            type: string
          example: ''
        - name: search_text
          in: query
          description: Search credit notes by credit note number or customer name or credit note reference number. <code>Maximum length [100]</code>
          required: false
          schema:
            type: string
          example: ''
        - name: sort_column
          in: query
          description: Sort credit notes by following columns customer_name, creditnote_number, balance, total, date and created_time. Allowed Values <code>customer_name</code> <code>creditnote_number</code> <code>balance</code> <code>total</code> <code>date</code> and <code>created_time</code>
          required: false
          schema:
            type: string
          example: created_time
        - name: page
          in: query
          description: Page number to be fetched. Default value is 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-credit-notes-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /creditnotes/{creditnote_id}:
    put:
      tags:
        - credit-notes
      operationId: update_credit_note
      summary: Update a credit note
      description: Update Details of an existing creditnote.
      parameters:
        - name: ignore_auto_number_generation
          in: query
          description: Set to true if you need to provide your own credit note number.
          required: false
          schema:
            type: boolean
          example: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-credit-note-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-credit-note-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.UPDATE
    get:
      tags:
        - credit-notes
      operationId: get_credit_note
      summary: Get a credit note
      description: Details of an existing creditnote.
      parameters:
        - name: print
          in: query
          description: 'Export credit note pdf with default print option. Allowed Values: <code>true</code>, <code>false</code>, <code>on</code> and <code>off</code>'
          required: false
          schema:
            type: boolean
          example: true
        - name: accept
          in: query
          description: 'You can get credit note details as json/pdf/html. Default format is html. Allowed Values: <code>json</code>, <code>pdf</code> and <code>html</code>'
          required: false
          schema:
            type: string
          example: ''
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-a-credit-note-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.READ
    delete:
      tags:
        - credit-notes
      operationId: delete_credit_note
      summary: Delete a credit note
      description: Delete an existing credit note.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-credit-note-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.creditnotes.DELETE
    parameters:
      - name: creditnote_id
        in: path
        required: true
        description: Unique identifier of the credit note.
        schema:
          type: string
        example: '90300000072369'
      - $ref: '#/components/parameters/organization_id'
  /creditnotes/{creditnote_id}/email:
    post:
      tags:
        - credit-notes
      operationId: email_credit_note
      summary: Email a credit note
      description: Email a credit note.
      parameters:
        - name: customer_id
          in: query
          description: Customer ID of the customer for whom the credit note is raised.
          required: false
          schema:
            type: string
          example: '903000000000099'
        - name: attachments
          in: query
          description: The files to be attached with the email.
          required: false
          schema:
            type: string
            format: binary
          example: ''
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/email-a-credit-note-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
