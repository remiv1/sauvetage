openapi: 3.0.0
info:
  title: Retainer Invoices
  description: 'A retainer invoice is an advanced payment from a customer before we record any transaction with him.<br><br><b>Possible error codes: </b><br><table><thead><tr><th>Error Code</th><th>Message</th></tr></thead><tbody><tr><td><span style="color:#FF0000;"> 9520</span></td><td>Retainer Invoices for which payments have been recorded cannot be deleted</td></tr><tr><td><span style="color:#FF0000;"> 9533</span></td><td>Cannot modify Retainer Invoice amount, once the payment is recorded</td></tr></tbody></table>'
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/invoice/v3
    description: API Endpoint
tags:
  - name: retainer-invoices
    description: Retainer-Invoices Module
paths:
  /retainerinvoices:
    post:
      tags:
        - retainer-invoices
      operationId: create_retainer_invoice
      summary: Create a retainer invoice
      description: Create a retainer invoice for your customer.
      parameters:
        - name: ignore_auto_number_generation
          in: query
          description: Ignore auto invoice number generation for this invoice. This mandates the invoice number. Allowed values <code>true</code> and <code>false</code>
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-a-retainer-invoice-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    get:
      tags:
        - retainer-invoices
      operationId: list_retainer_invoices
      summary: List Retainer invoices
      description: List all retainer invoices with pagination.
      parameters:
        - name: print
          in: query
          description: Print the exported pdf.
          required: false
          schema:
            type: boolean
        - name: sort_column
          in: query
          description: 'Sort retainer invoices.Allowed Values: <code>customer_name</code>, <code>retainer invoice_number</code>, <code>date</code>, <code> due_date</code>, <code>total</code>, <code>balance</code> and  <code>created_time</code>'
          required: false
          schema:
            type: string
          example: created_time
        - name: filter_by
          in: query
          description: 'Filter invoices by any status or payment expected date.Allowed Values: <code> Status.All</code>, <code>Status.Sent</code>, <code> Status.Draft</code>, <code>Status.OverDue</code>, <code>Status.Paid</code>, <code>Status.Void</code>, <code>Status.Unpaid</code>, <code>Status.PartiallyPaid</code>,<code> Status.Viewed</code> and <code>Date.PaymentExpectedDate</code>'
          required: false
          schema:
            type: string
          example: ''
        - name: sort_order
          in: query
          description: The order for sorting
          required: false
          schema:
            type: string
          example: D
        - name: page
          in: query
          description: Number of pages
          required: false
          schema:
            type: integer
          example: 1
        - name: per_page
          in: query
          description: Number of records to be fetched per page. Default value is 200.
          required: false
          schema:
            type: integer
            default: 200
          example: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-retainer-invoices-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}:
    put:
      tags:
        - retainer-invoices
      operationId: update_retainer_invoice
      summary: Update a retainer invoice
      description: Update an existing invoice.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-a-retainer-invoice-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.UPDATE
    get:
      tags:
        - retainer-invoices
      operationId: get_retainer_invoice
      summary: Get a retainer invoice
      description: Get the details of a retainer invoice.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    delete:
      tags:
        - retainer-invoices
      operationId: delete_retainer_invoice
      summary: Delete a retainer invoice
      description: Delete an existing retainer invoice. Invoices which have payment or credits note applied cannot be deleted.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.DELETE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/status/sent:
    post:
      tags:
        - retainer-invoices
      operationId: mark_retainer_invoice_as_sent
      summary: Mark a retainer invoice as sent
      description: Mark a draft retainer invoice as sent.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mark-a-retainer-invoice-as-sent-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/templates/{template_id}:
    put:
      tags:
        - retainer-invoices
      operationId: update_retainer_invoice_template
      summary: Update retainer invoice template
      description: Update the pdf template associated with the retainer invoice.
      parameters:
        - name: template_id
          in: path
          required: true
          description: Unique identifier of the retainer invoice template.
          schema:
            type: string
          example: 982000000000143
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-retainer-invoice-template-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.UPDATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/status/void:
    post:
      tags:
        - retainer-invoices
      operationId: mark_retainer_invoice_as_void
      summary: Void a retainer invoice
      description: Mark an invoice status as void. Upon voiding, the payments and credits associated with the retainer invoices will be unassociated and will be under customer credits.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/void-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{reatinerinvoice_id}/status/draft:
    post:
      tags:
        - retainer-invoices
      operationId: mark_retainer_invoice_as_draft
      summary: Mark as draft
      description: Mark a voided retainer invoice as draft.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mark-as-draft-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    parameters:
      - name: reatinerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: '982000000567114'
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/email:
    post:
      tags:
        - retainer-invoices
      operationId: email_retainer_invoice
      summary: Email a retainer invoice
      description: Email a retainer invoice to the customer. Input json string is not mandatory. If input json string is empty, mail will be send with default mail content.
      parameters:
        - name: send_customer_statement
          in: query
          description: Send customer statement pdf a with email.
          required: false
          schema:
            type: boolean
          example: ' '
        - name: send_attachment
          in: query
          description: Send the retainer invoice attachment a with the email.
          required: false
          schema:
            type: boolean
          example: ' '
        - name: attachments
          in: query
          description: Files to be attached to the email
          required: false
          schema:
            type: string
            format: binary
          example: ''
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/email-a-retainer-invoice-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/email-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    get:
      tags:
        - retainer-invoices
      operationId: get_retainer_invoice_email_content
      summary: Get retainer invoice email content
      description: Get the email content of a retainer invoice.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-retainer-invoice-email-content-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/address/billing:
    put:
      tags:
        - retainer-invoices
      operationId: update_retainer_invoice_billing_address
      summary: Update billing address
      description: Updates the billing address for this retainer invoice alone.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-billing-address-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-billing-address-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.UPDATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/templates:
    get:
      tags:
        - retainer-invoices
      operationId: list_retainer_invoice_templates
      summary: List retainer invoice templates
      description: Get all retainer invoice pdf templates.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-retainer-invoice-templates-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/attachment:
    get:
      tags:
        - retainer-invoices
      operationId: get_retainer_invoice_attachment
      summary: Get a retainer invoice attachment
      description: Returns the file attached to the retainer invoice.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-a-retainer-invoice-attachment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    post:
      tags:
        - retainer-invoices
      operationId: add_retainer_invoice_attachment
      summary: Add attachment to a retainer invoice
      description: Attach a file to an invoice.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/add-attachment-to-a-retainer-invoice-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/add-attachment-to-a-retainer-invoice-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/documents/{document_id}:
    delete:
      tags:
        - retainer-invoices
      operationId: delete_retainer_invoice_attachment
      summary: Delete an attachment
      description: Delete the file attached to the retainer invoice.
      parameters:
        - name: document_id
          in: path
          required: true
          description: Unique identifier of the retainer invoice document.
          schema:
            type: string
          example: '982000000567115'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-an-attachment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.DELETE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/comments:
    get:
      tags:
        - retainer-invoices
      operationId: list_retainer_invoice_comments
      summary: List retainer invoice comments & history
      description: Get the complete history and comments of a retainer invoice.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-retainer-invoice-comments-and-history-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.READ
    post:
      tags:
        - retainer-invoices
      operationId: add_retainer_invoice_comment
      summary: Add comment
      description: Add a comment for a retainer invoice.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/add-comment-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/add-comment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.CREATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
  /retainerinvoices/{retainerinvoice_id}/comments/{comment_id}:
    delete:
      tags:
        - retainer-invoices
      operationId: delete_retainer_invoice_comment
      summary: Delete a comment
      description: Delete a retainer invoice comment.
      parameters:
        - name: comment_id
          in: path
          required: true
          description: Unique identifier of the comment.
          schema:
            type: string
          example: 982000000567019
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete-a-comment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.DELETE
    put:
      tags:
        - retainer-invoices
      operationId: update_retainer_invoice_comment
      summary: Update comment
      description: Update an existing comment of a retainer invoice.
      parameters:
        - name: comment_id
          in: path
          required: true
          description: Unique identifier of the comment.
          schema:
            type: string
          example: 982000000567019
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-comment-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-comment-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoInvoice.invoices.UPDATE
    parameters:
      - name: retainerinvoice_id
        in: path
        required: true
        description: Unique identifier of the retainer invoice.
        schema:
          type: string
        example: 982000000567114
      - $ref: '#/components/parameters/organization_id'
components:
  parameters:
    organization_id:
      name: X-com-zoho-invoice-organizationid
      description: ID of the organization
      in: header
      required: true
      schema:
        type: string
      example: '10234695'
  schemas:
    gendoc-attributes-schema:
      $ref: '#/components/schemas/retainerinvoices-response'
    retainerinvoices-response:
      type: object
      properties:
        retainerinvoice_id:
          $ref: '#/components/schemas/retainerinvoice_id'
        retainerinvoice_number:
          $ref: '#/components/schemas/retainerinvoice_number'
        date:
          $ref: '#/components/schemas/date'
        status:
          $ref: '#/components/schemas/status'
        is_pre_gst:
          $ref: '#/components/schemas/is_pre_gst'
        place_of_supply:
          $ref: '#/components/schemas/place_of_supply'
        project_id:
          $ref: '#/components/schemas/project_id'
        project_name:
          $ref: '#/components/schemas/project_name'
        last_payment_date:
          $ref: '#/components/schemas/last_payment_date'
        reference_number:
          $ref: '#/components/schemas/reference_number'
        customer_id:
          $ref: '#/components/schemas/customer_id'
        customer_name:
          $ref: '#/components/schemas/customer_name'
        contact_persons:
          $ref: '#/components/schemas/contact_persons'
        currency_id:
          $ref: '#/components/schemas/currency_id'
        currency_code:
          $ref: '#/components/schemas/currency_code'
        currency_symbol:
          $ref: '#/components/schemas/currency_symbol'
        exchange_rate:
          $ref: '#/components/schemas/exchange_rate'
        is_viewed_by_client:
          $ref: '#/components/schemas/is_viewed_by_client'
        client_viewed_time:
          $ref: '#/components/schemas/client_viewed_time'
        is_inclusive_tax:
          $ref: '#/components/schemas/is_inclusive_tax'
        line_items:
          description: Line items of a retainer invoice.
          type: array
          items:
            type: object
            properties:
              line_item_id:
                $ref: '#/components/schemas/line_item_id'
              description:
                $ref: '#/components/schemas/description'
              item_order:
                $ref: '#/components/schemas/item_order'
              rate:
                $ref: '#/components/schemas/rate'
              bcy_rate:
                $ref: '#/components/schemas/bcy_rate'
              tax_id:
                $ref: '#/components/schemas/tax_id'
              tax_name:
                $ref: '#/components/schemas/tax_name'
              tax_type:
                $ref: '#/components/schemas/tax_type'
              tax_percentage:
                $ref: '#/components/schemas/tax_percentage'
              item_total:
                $ref: '#/components/schemas/item_total'
        sub_total:
          $ref: '#/components/schemas/sub_total'
        total:
          $ref: '#/components/schemas/total'
        taxes:
          $ref: '#/components/schemas/taxes'
        payment_made:
          $ref: '#/components/schemas/payment_made'
        payment_drawn:
          $ref: '#/components/schemas/payment_drawn'
        balance:
          $ref: '#/components/schemas/balance'
        allow_partial_payments:
          $ref: '#/components/schemas/allow_partial_payments'
        price_precision:
          $ref: '#/components/schemas/price_precision'
        payment_options:
          $ref: '#/components/schemas/payment_options'
        is_emailed:
          $ref: '#/components/schemas/is_emailed'
        documents:
          $ref: '#/components/schemas/documents'
        billing_address:
          $ref: '#/components/schemas/billing_address'
        shipping_address:
          $ref: '#/components/schemas/shipping_address'
        notes:
          $ref: '#/components/schemas/notes'
        terms:
          $ref: '#/components/schemas/terms'
        custom_fields:
          $ref: '#/components/schemas/custom_fields'
        template_id:
          $ref: '#/components/schemas/template_id'
        template_name:
          $ref: '#/components/schemas/template_name'
        page_width:
          $ref: '#/components/schemas/page_width'
        page_height:
          $ref: '#/components/schemas/page_height'
        orientation:
          $ref: '#/components/schemas/orientation'
        template_type:
          $ref: '#/components/schemas/template_type'
        created_time:
          $ref: '#/components/schemas/created_time'
        last_modified_time:
          $ref: '#/components/schemas/last_modified_time'
        created_by_id:
          $ref: '#/components/schemas/created_by_id'
        attachment_name:
          $ref: '#/components/schemas/attachment_name'
        can_send_in_mail:
          $ref: '#/components/schemas/can_send_in_mail'
        invoice_url:
          $ref: '#/components/schemas/invoice_url'
    page:
      description: Number of pages
      type: integer
      example: 1
    per_page:
      description: Per page values
      type: integer
      example: 200
    report_name:
      description: The report name
      type: string
      example: Retainer Invoices
    has_more_page:
      description: Check if there are more pages
      type: boolean
      example: false
    sort_order:
      description: The order for sorting
      type: string
      example: D
    place_of_supply:
      description: Place where the goods/services are supplied to. (If not given, <code>place of contact</code> given for the contact will be taken)
      type: string
      example: TN
      x-node_available_in:
        - in
      x-node_unavailable_in: []
    is_pre_gst:
      description: Applicable for transactions that fall before july 1, 2017
      type: string
      example: false
    project_id:
      description: ID of the project
      type: string
      example: 982000000567154
    project_name:
      description: Name of the project
      type: string
    street2:
      type: string
      example: McMillan Avenue
    sort_column:
      description: 'Sort retainer invoices.Allowed Values: <code>customer_name</code>, <code>retainer invoice_number</code>, <code>date</code>, <code> due_date</code>, <code>total</code>, <code>balance</code> and  <code>created_time</code>'
      type: string
      example: created_time
    applied_filter:
      description: The filer applied for sorting
      type: string
      example: Status.All
    retainerinvoice_id:
      description: The id of the retainerinvoice
      type: string
      example: 982000000567114
    retainerinvoice_number:
      description: number of the retainer invoice.
      type: string
      example: RET-00003
    customer_name:
      description: The name of the customer. <code>Maximum length [100]</code>
      type: string
      example: Bowman & Co
    customer_id:
      description: ID of the customer the retainer invoice has to be created.
      type: string
      example: 982000000567001
    status:
      description: 'retainer invoice status.Allowed Values: <code>sent</code>, <code>draft</code>, <code>overdue</code>, <code>paid</code>, <code>void</code>, <code>unpaid</code>, <code>partially_paid</code> and <code>viewed</code>'
      type: string
      example: draft
    reference_number:
      description: The reference number of the retainer invoice. <code>Maximum length [100]</code>
      type: string
      example: ' '
    date:
