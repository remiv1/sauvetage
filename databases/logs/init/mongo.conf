# Configuration MongoDB pour les logs

net:
  port: 27017
  bindIp: 0.0.0.0

security:
  authorization: enabled

storage:
  engine: wiredTiger
  dbPath: /data/db
  journal:
    enabled: true

systemLog:
  destination: stdout
  logAppend: true
  level: info

# Performance
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100

