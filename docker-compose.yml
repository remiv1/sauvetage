services:
  app-front:
    container_name: sauv-app
    build:
      context: .
      dockerfile: app_front/Dockerfile.flask
    env_file:
      - ./databases/main/.env.db_main
      - ./databases/logs/.env.db_logs
      - ./app_front/.env.flask
    volumes:
      - sauv-documents-front:/home/root/app/documents
    networks:
      - sauv-network
      - sauv-secure
    depends_on:
      - proxy
      - db-main
      - db-logs
      - app-back
    restart: on-failure:5
    
  app-back:
    container_name: sauv-back
    build:
      context: .
      dockerfile: app_back/Dockerfile.fast
    env_file:
      - ./databases/main/.env.db_main
      - ./databases/logs/.env.db_logs
      - ./app_back/.env.fast
    volumes:
      - sauv-documents-back:/home/root/app/documents
    networks:
      - sauv-secure
    depends_on:
      - proxy
      - db-main
      - db-logs
    restart: on-failure:5

  proxy:
    container_name: sauv-proxy
    build:
      context: ./proxy
      dockerfile: ./Dockerfile.traefik
    env_file:
      - ./proxy/.env.proxy
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - sauv-network
    volumes:
      - sauv-traefik-pki:/app/pki:Z
      - ./proxy/traefik.yml:/etc/traefik/traefik.yml:ro,Z
      - ./proxy/dynamic:/etc/traefik/dynamic:ro,Z
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db-main:
    container_name: sauv-db-main
    build:
      context: ./databases/main
      dockerfile: ./Dockerfile.postgres
    env_file:
      - ./databases/main/.env.db_main
    networks:
      - sauv-network
      - sauv-secure
    volumes:
      - db-main-data:/var/lib/postgresql
    restart: on-failure:5

  db-logs:
    container_name: sauv-db-logs
    build:
      context: ./databases/logs
      dockerfile: ./Dockerfile.mongo
    env_file:
      - ./databases/logs/.env.db_logs
    networks:
      - sauv-network
      - sauv-secure
    restart: on-failure:5
    
volumes:
  db-main-data:
    driver: local
  
  sauv-logs-data:
    driver: local
  
  sauv-documents-front:
    driver: local
    driver_opts:
      type: none
      device: ./documents/front
      o: bind

  sauv-documents-back:
    driver: local
    driver_opts:
      type: none
      device: ./documents/back
      o: bind

  sauv-traefik-pki:
    driver: local

networks:
  sauv-network:
    driver: bridge
  sauv-secure:
    driver: bridge

